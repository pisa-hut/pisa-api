syntax = "proto3";

package pisa_api;

import "object.proto";
import "google/protobuf/struct.proto";

message CollisionInfo {
  bool occurred = 1;

  // Optional actor references if the simulator can provide them.
  optional int32 actor_a = 2;
  optional int32 actor_b = 3;

  // Optional implementation detail such as impulse or contact normal.
  google.protobuf.Struct details = 4;
}
